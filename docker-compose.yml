services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: financial_data
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d financial_data"]
      interval: 5s
      timeout: 5s
      retries: 5

  pipeline:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://pipeline:pipeline@postgres:5432/financial_data
    command: ["sh", "-c", "python generate_data.py && python -m src.pipeline --load-database"]
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports

  dashboard:
    build: .
    depends_on:
      pipeline:
        condition: service_completed_successfully
    command: ["streamlit", "run", "dashboard/app.py", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro

volumes:
  postgres_data:
